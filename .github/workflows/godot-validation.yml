name: Godot 4.7 validation

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-24.04
    steps:
      - name: Check out pull request
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Godot 4.7 stable
        shell: bash
        run: |
          set -euo pipefail
          GODOT_VERSION="4.7-stable"
          GODOT_ARCHIVE="Godot_v4.7-stable_linux.x86_64.zip"
          GODOT_SHA256="0b1a6c54c2c619c12e169fe9241edda4b81080b519451cec2984bf0d2c6cb73c"
          curl --fail --location --retry 3 \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/${GODOT_ARCHIVE}" \
            --output /tmp/godot.zip
          echo "${GODOT_SHA256}  /tmp/godot.zip" | sha256sum --check --status
          unzip -q /tmp/godot.zip -d /tmp/godot
          chmod +x "/tmp/godot/Godot_v4.7-stable_linux.x86_64"
          "/tmp/godot/Godot_v4.7-stable_linux.x86_64" --version

      - name: Import project and verify metadata stability
        shell: bash
        run: |
          set -euo pipefail
          GODOT="/tmp/godot/Godot_v4.7-stable_linux.x86_64"
          "$GODOT" --headless --path . --import
          test -z "$(git status --porcelain)"

      - name: Run full GUT suite
        shell: bash
        run: |
          set -euo pipefail
          GODOT="/tmp/godot/Godot_v4.7-stable_linux.x86_64"
          "$GODOT" --headless -d -s --path "$GITHUB_WORKSPACE" \
            addons/gut/gut_cmdln.gd -gdisable_colors

      - name: Load editor headlessly
        shell: bash
        run: |
          set -euo pipefail
          /tmp/godot/Godot_v4.7-stable_linux.x86_64 --headless --path . --editor --quit
